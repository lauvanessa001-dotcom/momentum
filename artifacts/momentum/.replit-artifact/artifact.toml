kind = "mobile"
previewPath = "/"
title = "Momentum"
version = "1.0.0"
id = "artifacts/momentum"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21791

[services.development]
run = "pnpm --filter @workspace/momentum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/momentum", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/momentum", "run", "serve" ]

[services.env]
PORT = "21791"
BASE_PATH = "/"
